<div class="waiting-container">
  <div class="glass-card waiting-card">
    <div class="waiting-icon">
      <div class="spinner-pulse"></div>
      <i class="fa-solid fa-hourglass-half"></i>
    </div>
    
    <h2>Approval Pending</h2>
    
    <div class="waiting-message">
      <p>Your registration request has been successfully submitted and is currently <strong>awaiting admin approval</strong>.</p>
      <p>Once your account is verified and linked to your Consumer Number, you will be able to access the dashboard. Please check back later.</p>
    </div>

    <div class="actions">
      <button class="btn btn-outline-primary" (click)="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Return to Login
      </button>
    </div>
  </div>
</div>
